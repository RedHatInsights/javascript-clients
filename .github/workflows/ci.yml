name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Default permissions for PR builds - read-only
# Release job overrides with write permissions
permissions:
  contents: read

jobs:
  install:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
      - uses: './.github/actions/setup-environment'
      # cache cypress runner
      - uses: './.github/actions/cypress-cache'
      - name: Check Node version
        run: node --version && npm --version
      - name: Install deps
        run: npm ci
  lint:
    needs: [install]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: './.github/actions/setup-environment'
      - uses: './.github/actions/lint'
  test:
    runs-on: ubuntu-24.04
    needs: [install]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: './.github/actions/setup-environment'
      - uses: './.github/actions/test-unit'
  integration:
    runs-on: ubuntu-24.04
    needs: [install]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: './.github/actions/setup-environment'
      - uses: './.github/actions/test-integration'
  build:
    runs-on: ubuntu-24.04
    needs: [install]
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - uses: './.github/actions/setup-environment'
      - uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
      - name: Install deps
        run: npm ci
      - name: Build affected
        env:
          NX_SKIP_NX_CACHE: true
        run: npx nx affected -t build --exclude=@redhat-cloud-services/CLIENTNAME-client
  release:
    runs-on: ubuntu-24.04
    needs: [install, lint, test, build]
    # Only run on push to main branch (never on PRs, workflow_dispatch, etc.)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: npm-publish
    permissions:
      contents: write  # Needed for git push
      id-token: write  # Needed for npm publish
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.BOT_SSH_KEY}}
      - uses: './.github/actions/setup-environment'
      - uses: './.github/actions/release'
        with:
          gh_token: ${{ secrets.BOT_GH_TOKEN }}
          gh_name: ${{ secrets.GH_NAME }}
          gh_email: ${{ secrets.GH_EMAIL }}
