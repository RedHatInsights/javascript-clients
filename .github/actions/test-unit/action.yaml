name: Unit tests
description: verify unit tests
runs:
  using: "composite"
  steps:
    - uses: nrwl/nx-set-shas@3e9ad7370203c1e93d109be57f3b72eb0eb511b1 # v4
    - name: Install deps
      shell: bash
      run: npm ci
    - name: Test affected
      shell: bash
      run: npx nx affected -t test --configuration=ci --exclude=@redhat-cloud-services/CLIENTNAME-client
